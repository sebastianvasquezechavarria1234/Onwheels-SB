services:
  frontend:
    build:
      context: .
      dockerfile: dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api
        VITE_API_BASE: http://localhost:8080
        VITE_REACT_APP_API_URL: http://localhost:8080/api
    container_name: onwheels-frontend
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ../OnWheels-SB-Api
      dockerfile: dockerfile
    container_name: onwheels-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
    restart: unless-stopped